# Example compose for jurisd.
#
# IMPORTANT — read this before `up`:
# jurisd is a stdio MCP server. A real MCP client (Claude Code, Claude Desktop)
# spawns itsa OWN process per session and owns its stdin/stdout. There is no
# long-lived network daemon to "run" in the usual compose sense, so compose is
# only useful here for two things:
#
#   1. Building + tagging the image (`docker compose build`).
#   2. Holding an idle container you can `exec` an interactive handshake into,
#      for local smoke-testing of the stdio protocol.
#
# For actual MCP client use, point the client at `docker run -i ...` directly
# (see docs/DOCKER.md "Use with Claude Code"); do NOT route the client through
# this compose service.

services:
  jurisd:
    build:
      context: .
      dockerfile: Dockerfile
    image: jurisd:latest
    container_name: jurisd

    # The default entrypoint (node dist/index.js) is a stdio server: with no
    # client attached to stdin it would read EOF and exit. To keep a container
    # alive for `exec`-based smoke tests, override the command to idle. This is
    # a TEST convenience, not how the MCP client talks to the server.
    entrypoint: ["sleep", "infinity"]

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # Local data modules are read from here; mount real modules at this path.
      JURISD_MODULES_DIR: /data/modules
      AUSTLII_SEARCH_BASE: ${AUSTLII_SEARCH_BASE:-https://www.austlii.edu.au/cgi-bin/sinosrch.cgi}
      AUSTLII_REFERER: ${AUSTLII_REFERER:-https://www.austlii.edu.au/forms/search1.html}
      AUSTLII_TIMEOUT: ${AUSTLII_TIMEOUT:-60000}
      # Optional removed.invalid session cookie for authenticated fetch (see .env.example).
      SESSION_COOKIE: ${SESSION_COOKIE:-}

    volumes:
      # Mount your installed parquet data modules read-only at the documented
      # mount point. Create ./modules locally (or point at ~/.jurisd/modules).
      - ./modules:/data/modules:ro

# Usage:
#   docker compose build
#   docker compose up -d
#   # one-shot stdio handshake against the running container:
#   docker compose exec -T jurisd node dist/index.js < handshake.jsonl
#   docker compose down
#
# `exec -T` disables the pseudo-TTY so the JSON-RPC bytes are piped cleanly.
# Each `exec` spawns a fresh `node dist/index.js` — exactly the per-invocation
# model an MCP client uses, just reached through the idle container.

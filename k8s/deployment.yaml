---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jurisd
  namespace: jurisd
  labels:
    app.kubernetes.io/name: jurisd
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: jurisd
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jurisd
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - jurisd
                topologyKey: kubernetes.io/hostname
      # Only needed when pulling from a private registry; remove for public images.
      imagePullSecrets:
        - name: registry-credentials
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: jurisd
          # SECURITY: pin to an immutable digest in production. CI publishes an
          # immutable ghcr.io/<owner>/jurisd:<git-sha> tag per build (see
          # .github/workflows/docker.yml) alongside a floating :latest. Replace
          # the tag below with @sha256:<digest> of the build you intend to run.
          image: ghcr.io/OWNER/jurisd:latest
          # Always re-pull while a floating tag is in use so a node cannot serve
          # a stale or poisoned cached :latest (no effect once pinned by digest).
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: jurisd-config
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            # Writable scratch + state mounts so the container can run with a
            # read-only root filesystem (securityContext below). /tmp holds
            # fetch-module downloads + DuckDB scratch; /data holds installed
            # modules and the citation cache (AUSLAW_CACHE_DIR=/data/cache).
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: jurisd-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: tmp
          emptyDir: {}
        - name: data
          emptyDir: {}
      securityContext:
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

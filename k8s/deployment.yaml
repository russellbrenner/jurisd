---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jurisd
  namespace: jurisd
  labels:
    app.kubernetes.io/name: jurisd
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: jurisd
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jurisd
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - jurisd
                topologyKey: kubernetes.io/hostname
      imagePullSecrets:
        - name: gitea-registry
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: jurisd
          image: git.itsa.house/rbrenner/jurisd:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: jurisd-config
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: jurisd-config
            items:
              - key: config.yaml
                path: config.yaml
      securityContext:
        fsGroup: 1001

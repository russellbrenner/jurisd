name: Build auslaw-mcp

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package*.json"
      - "tsconfig.json"
      - "Dockerfile"
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
          AUTH_URL=$(echo "$REPO_URL" | sed "s|https://|https://token:${DEPLOY_TOKEN}@|")
          rm -rf checkout && git clone --depth=1 "$AUTH_URL" checkout

      - name: Registry login
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          buildah login --username "${REGISTRY_USER}" --password "${REGISTRY_TOKEN}" git.itsa.house

      - name: Build image
        run: |
          buildah bud \
            --tag git.itsa.house/rbrenner/auslaw-mcp:latest \
            --tag git.itsa.house/rbrenner/auslaw-mcp:${{ github.sha }} \
            checkout/

      - name: Push image
        run: |
          buildah push git.itsa.house/rbrenner/auslaw-mcp:latest
          buildah push git.itsa.house/rbrenner/auslaw-mcp:${{ github.sha }}

      - name: Notify
        if: always()
        env:
          WEBHOOK: ${{ secrets.MATTERMOST_AGENT_WEBHOOK }}
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([ "$STATUS" = "success" ] && echo ":white_check_mark:" || echo ":x:")
          curl -s -X POST "$WEBHOOK" -H "Content-Type: application/json" -d \
            "{\"text\": \"$EMOJI **auslaw-mcp** image build $STATUS — \`${{ github.sha }}\`\"}"
